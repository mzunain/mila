services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mila
      POSTGRES_USER: mila
      POSTGRES_PASSWORD: mila
    volumes:
      - mila-postgres:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  asr-worker:
    build:
      context: ../apps/asr-worker
    ports:
      - "9000:9000"
    environment:
      WHISPER_MODEL: small
      WHISPER_DEVICE: auto
      WHISPER_COMPUTE_TYPE: auto

volumes:
  mila-postgres:
