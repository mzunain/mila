services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mila
      POSTGRES_USER: mila
      POSTGRES_PASSWORD: mila
    volumes:
      - mila-postgres:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mila -d mila"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  asr-worker:
    build:
      context: ../apps/asr-worker
      args:
        # Each 5-second chunk must transcribe in *under* 5 seconds or the queue
        # backs up and every chunk eventually blows past the API's ASR_TIMEOUT_MS,
        # which the UI shows as a transcript stuck forever on "waiting". Measured
        # on a 4-vCPU colima VM (int8, greedy): base = 1.1-2.2x realtime (loses
        # the race), tiny = 0.65x (keeps up with headroom). So `tiny` is the
        # default. Override via WHISPER_MODEL in root .env when you have spare CPU
        # or a GPU (`base`/`small`/`large-v3` are more accurate but heavier).
        WHISPER_MODEL: ${WHISPER_MODEL:-tiny}
    ports:
      - "9000:9000"
    # Same env_file as the api service — keep root .env the single source of
    # truth for WHISPER_MODEL so a developer override actually propagates.
    env_file:
      - path: ../.env
        required: false
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-tiny}
      WHISPER_DEVICE: auto
      # int8 + greedy decoding (beam_size 1) + a thread count pinned to the VM's
      # vCPUs are what pull a CPU transcribe under realtime. Without the pin,
      # CTranslate2 reads the host's core count and oversubscribes the VM. See
      # the build args above for the measured realtime factors.
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_BEAM_SIZE: ${WHISPER_BEAM_SIZE:-1}
      WHISPER_CPU_THREADS: ${WHISPER_CPU_THREADS:-4}

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      asr-worker:
        condition: service_started
    ports:
      - "7400:7400"
    # Load API keys + tunables from the repo-root .env. Anything explicitly set
    # under `environment:` below overrides values in this file, so the
    # container's DATABASE_URL / REDIS_URL / ASR_BASE_URL always point at the
    # compose-internal services, never at whatever the developer uses for host
    # dev (typically localhost:15432, localhost:16379, 127.0.0.1:9000).
    env_file:
      - path: ../.env
        required: false
    environment:
      NODE_ENV: production
      API_PORT: 7400
      DATABASE_URL: postgresql://mila:mila@postgres:5432/mila
      REDIS_URL: redis://redis:6379
      # The asr-worker is always a dependency of this stack, so the containerised
      # API must always use the real (http) ASR provider. Pin it here rather than
      # relying on root .env — that keeps the auto-started backend from silently
      # falling back to simulated "mock" transcripts if .env drifts or is absent.
      ASR_PROVIDER: http
      ASR_BASE_URL: http://asr-worker:9000
      # Headroom over the worker's per-chunk time. With `tiny` each chunk lands
      # in a few seconds; this only guards the occasional dense/long chunk, while
      # still abandoning a genuinely stuck worker instead of hanging the session.
      ASR_TIMEOUT_MS: ${ASR_TIMEOUT_MS:-45000}

volumes:
  mila-postgres:
